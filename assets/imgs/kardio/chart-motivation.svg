<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" fill="none">
  <style>
    .chart-title { font-family: system-ui, -apple-system, sans-serif; font-size: 15px; font-weight: 600; fill: #ffffff; }
    .chart-label { font-family: system-ui, -apple-system, sans-serif; font-size: 11.5px; font-weight: 400; fill: rgba(255,255,255,0.65); }
    .chart-value { font-family: system-ui, -apple-system, sans-serif; font-size: 11.5px; font-weight: 500; fill: #81d8d0; }
  </style>
  <text x="40" y="36" class="chart-title">What would motivate switching to a new app?</text>
  <!-- Bar 1 -->
  <text x="40" y="80" class="chart-label">Task automation</text>
  <rect x="40" y="90" width="464" height="22" rx="4" fill="rgba(255,255,255,0.06)"/>
  <rect x="40" y="90" width="144" height="22" rx="4" fill="#81d8d0"/>
  <text x="192" y="106" class="chart-value">31.0%</text>
  <!-- Bar 2 -->
  <text x="40" y="140" class="chart-label">Workout and interface customization</text>
  <rect x="40" y="150" width="464" height="22" rx="4" fill="rgba(255,255,255,0.06)"/>
  <rect x="40" y="150" width="128" height="22" rx="4" fill="#81d8d0" opacity="0.82"/>
  <text x="176" y="166" class="chart-value">27.6%</text>
  <!-- Bar 3 -->
  <text x="40" y="200" class="chart-label">Ease of use</text>
  <rect x="40" y="210" width="464" height="22" rx="4" fill="rgba(255,255,255,0.06)"/>
  <rect x="40" y="210" width="80" height="22" rx="4" fill="#81d8d0" opacity="0.65"/>
  <text x="128" y="226" class="chart-value">17.2%</text>
  <!-- Bar 4 -->
  <text x="40" y="260" class="chart-label">Performance and progress reports</text>
  <rect x="40" y="270" width="464" height="22" rx="4" fill="rgba(255,255,255,0.06)"/>
  <rect x="40" y="270" width="48" height="22" rx="4" fill="#81d8d0" opacity="0.50"/>
  <text x="96" y="286" class="chart-value">10.3%</text>
</svg>
