<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" fill="none">
  <style>
    .chart-title { font-family: system-ui, -apple-system, sans-serif; font-size: 15px; font-weight: 600; fill: #ffffff; }
    .chart-label { font-family: system-ui, -apple-system, sans-serif; font-size: 11.5px; font-weight: 400; fill: rgba(255,255,255,0.65); }
    .chart-value { font-family: system-ui, -apple-system, sans-serif; font-size: 11.5px; font-weight: 500; fill: #81d8d0; }
  </style>
  <text x="40" y="36" class="chart-title">Most painful tasks in a trainer's routine</text>
  <!-- Bar 1 -->
  <text x="40" y="80" class="chart-label">Create and update workouts</text>
  <rect x="40" y="90" width="464" height="22" rx="4" fill="rgba(255,255,255,0.06)"/>
  <rect x="40" y="90" width="336" height="22" rx="4" fill="#81d8d0"/>
  <text x="384" y="106" class="chart-value">72.4%</text>
  <!-- Bar 2 -->
  <text x="40" y="140" class="chart-label">Keep students motivated</text>
  <rect x="40" y="150" width="464" height="22" rx="4" fill="rgba(255,255,255,0.06)"/>
  <rect x="40" y="150" width="288" height="22" rx="4" fill="#81d8d0" opacity="0.82"/>
  <text x="336" y="166" class="chart-value">62.1%</text>
  <!-- Bar 3 -->
  <text x="40" y="200" class="chart-label">Track results and progress</text>
  <rect x="40" y="210" width="464" height="22" rx="4" fill="rgba(255,255,255,0.06)"/>
  <rect x="40" y="210" width="192" height="22" rx="4" fill="#81d8d0" opacity="0.65"/>
  <text x="240" y="226" class="chart-value">41.4%</text>
  <!-- Bar 4 -->
  <text x="40" y="260" class="chart-label">Maintain communication with students</text>
  <rect x="40" y="270" width="464" height="22" rx="4" fill="rgba(255,255,255,0.06)"/>
  <rect x="40" y="270" width="160" height="22" rx="4" fill="#81d8d0" opacity="0.50"/>
  <text x="208" y="286" class="chart-value">34.5%</text>
  <!-- Bar 5 -->
  <text x="40" y="320" class="chart-label">Control payments</text>
  <rect x="40" y="330" width="464" height="22" rx="4" fill="rgba(255,255,255,0.06)"/>
  <rect x="40" y="330" width="144" height="22" rx="4" fill="#81d8d0" opacity="0.42"/>
  <text x="192" y="346" class="chart-value">31.0%</text>
</svg>
