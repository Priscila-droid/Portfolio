<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" fill="none">
  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#81d8d0" stop-opacity="0.5"/>
      <stop offset="40%" stop-color="#81d8d0" stop-opacity="0.35"/>
      <stop offset="70%" stop-color="#81d8d0" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#81d8d0" stop-opacity="0.06"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="420" fill="#060606" rx="14"/>


  <!-- ==================== HEADER ==================== -->
  <text x="600" y="48" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" text-anchor="middle" opacity="0.3" letter-spacing="4">JOURNEY</text>
  <text x="600" y="80" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" text-anchor="middle" opacity="0.85" letter-spacing="0.3">Where the experience stalled in practice</text>


  <!-- ==================== JOURNEY LINE at y=240 ==================== -->
  <line x1="100" y1="240" x2="1100" y2="240" stroke="url(#lineGrad)" stroke-width="1.5"/>


  <!-- ==================== STEP 01 ==================== -->
  <g>
    <text x="140" y="170" fill="#81d8d0" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" text-anchor="middle" letter-spacing="2" opacity="0.35">01</text>
    <text x="140" y="198" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" text-anchor="middle" opacity="0.88">Receive alert</text>
    <circle cx="140" cy="240" r="7" fill="#060606" stroke="#81d8d0" stroke-width="1" stroke-opacity="0.45"/>
    <circle cx="140" cy="240" r="2.5" fill="#81d8d0" opacity="0.5"/>
    <text x="140" y="278" fill="#81d8d0" font-family="system-ui, sans-serif" font-size="11" font-weight="500" text-anchor="middle" opacity="0.45">Too many signals</text>
    <text x="140" y="296" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle" opacity="0.3">at the same time</text>
  </g>


  <!-- ==================== STEP 02 ==================== -->
  <g>
    <text x="380" y="170" fill="#81d8d0" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" text-anchor="middle" letter-spacing="2" opacity="0.35">02</text>
    <text x="380" y="198" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" text-anchor="middle" opacity="0.88">Understand severity</text>
    <circle cx="380" cy="240" r="7" fill="#060606" stroke="#81d8d0" stroke-width="1" stroke-opacity="0.35"/>
    <circle cx="380" cy="240" r="2.5" fill="#81d8d0" opacity="0.4"/>
    <text x="380" y="278" fill="#81d8d0" font-family="system-ui, sans-serif" font-size="11" font-weight="500" text-anchor="middle" opacity="0.4">Little hierarchy</text>
    <text x="380" y="296" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle" opacity="0.28">between signals</text>
  </g>


  <!-- ==================== STEP 03 ==================== -->
  <g>
    <text x="620" y="170" fill="#81d8d0" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" text-anchor="middle" letter-spacing="2" opacity="0.35">03</text>
    <text x="620" y="198" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" text-anchor="middle" opacity="0.88">Access context</text>
    <circle cx="620" cy="240" r="7" fill="#060606" stroke="#81d8d0" stroke-width="1" stroke-opacity="0.25"/>
    <circle cx="620" cy="240" r="2.5" fill="#81d8d0" opacity="0.3"/>
    <text x="620" y="278" fill="#81d8d0" font-family="system-ui, sans-serif" font-size="11" font-weight="500" text-anchor="middle" opacity="0.35">Scattered information</text>
    <text x="620" y="296" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle" opacity="0.25">across multiple screens</text>
  </g>


  <!-- ==================== STEP 04 ==================== -->
  <g>
    <text x="860" y="170" fill="#81d8d0" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" text-anchor="middle" letter-spacing="2" opacity="0.35">04</text>
    <text x="860" y="198" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" text-anchor="middle" opacity="0.88">Decide action</text>
    <circle cx="860" cy="240" r="7" fill="#060606" stroke="#81d8d0" stroke-width="1" stroke-opacity="0.18"/>
    <circle cx="860" cy="240" r="2.5" fill="#81d8d0" opacity="0.2"/>
    <text x="860" y="278" fill="#81d8d0" font-family="system-ui, sans-serif" font-size="11" font-weight="500" text-anchor="middle" opacity="0.3">Uncertainty</text>
    <text x="860" y="296" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle" opacity="0.22">to act</text>
  </g>


  <!-- ==================== STEP 05 ==================== -->
  <g>
    <text x="1060" y="170" fill="#81d8d0" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" text-anchor="middle" letter-spacing="2" opacity="0.35">05</text>
    <text x="1060" y="198" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" text-anchor="middle" opacity="0.88">Track outcome</text>
    <circle cx="1060" cy="240" r="7" fill="#060606" stroke="#81d8d0" stroke-width="1" stroke-opacity="0.1"/>
    <circle cx="1060" cy="240" r="2.5" fill="#81d8d0" opacity="0.12"/>
    <text x="1060" y="278" fill="#81d8d0" font-family="system-ui, sans-serif" font-size="11" font-weight="500" text-anchor="middle" opacity="0.22">Traceability</text>
    <text x="1060" y="296" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle" opacity="0.18">limited</text>
  </g>


</svg>