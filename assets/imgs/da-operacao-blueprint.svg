<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" fill="none">
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#090909"/>
    </linearGradient>
    <linearGradient id="topGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#141a19"/>
      <stop offset="100%" stop-color="#0a0d0c"/>
    </linearGradient>
    <linearGradient id="priorityFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#81d8d0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#81d8d0" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.025"/></feComponentTransfer>
      <feBlend mode="overlay" in="SourceGraphic"/>
    </filter>
  </defs>

  <rect width="1200" height="640" fill="#050505" rx="12"/>
  <rect width="1200" height="640" fill="url(#noise)" rx="12" opacity="0.4"/>

  <!-- Title -->
  <text x="600" y="44" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" text-anchor="middle" opacity="0.9">A lógica da solução: menos ruído, mais contexto e prioridade</text>
  <line x1="380" y1="58" x2="820" y2="58" stroke="#81d8d0" stroke-width="0.5" opacity="0.15"/>


  <!--
    6 layers stacked vertically
    Each layer: 1044px wide, 76px tall, 10px gap
    Starting at y=84, left margin 88
    Layers: 84, 170, 256, 342, 428, 514
    Priority axis at x=56
  -->


  <!-- ==================== PRIORITY AXIS ==================== -->
  <!-- Vertical line with gradient -->
  <line x1="56" y1="84" x2="56" y2="590" stroke="url(#priorityFade)" stroke-width="1.5"/>
  <!-- Arrow at top -->
  <path d="M52 92 L56 80 L60 92" stroke="#81d8d0" stroke-opacity="0.5" stroke-width="1" fill="none"/>
  <!-- Label -->
  <text x="56" y="340" fill="#81d8d0" font-family="system-ui, sans-serif" font-size="10" font-weight="600" opacity="0.45" letter-spacing="3" text-anchor="middle" transform="rotate(-90, 56, 340)">PRIORIDADE</text>
  <!-- Tick marks connecting axis to layers -->
  <g stroke="#81d8d0" stroke-width="0.5">
    <line x1="56" y1="122" x2="88" y2="122" opacity="0.3"/>
    <line x1="56" y1="208" x2="88" y2="208" opacity="0.22"/>
    <line x1="56" y1="294" x2="88" y2="294" opacity="0.15"/>
    <line x1="56" y1="380" x2="88" y2="380" opacity="0.1"/>
    <line x1="56" y1="466" x2="88" y2="466" opacity="0.07"/>
    <line x1="56" y1="552" x2="88" y2="552" opacity="0.04"/>
  </g>


  <!-- ==================== LAYER 1: Leitura rápida ==================== -->
  <g transform="translate(88, 84)">
    <rect width="1044" height="76" rx="8" fill="url(#topGrad)" stroke="#81d8d0" stroke-opacity="0.18" stroke-width="0.5"/>
    <rect x="0" y="0" width="5" height="76" rx="2.5" fill="#81d8d0" opacity="0.6"/>
    <text x="24" y="30" fill="#81d8d0" font-family="system-ui, sans-serif" font-size="13" font-weight="600" opacity="0.9">Leitura rápida do cenário</text>
    <text x="24" y="50" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="11" opacity="0.55">Visão situacional imediata com indicadores de severidade</text>
    <!-- Abstract: 3 status cards with severity dots -->
    <g transform="translate(540, 14)">
      <rect width="140" height="48" rx="5" fill="#81d8d0" fill-opacity="0.06" stroke="#81d8d0" stroke-opacity="0.14" stroke-width="0.5"/>
      <circle cx="18" cy="16" r="4" fill="#81d8d0" opacity="0.45"/>
      <rect x="30" y="13" width="48" height="5" rx="2.5" fill="#81d8d0" opacity="0.3"/>
      <rect x="30" y="24" width="36" height="4" rx="2" fill="#81d8d0" opacity="0.15"/>
      <rect x="18" y="36" width="100" height="3" rx="1.5" fill="#81d8d0" opacity="0.08"/>
    </g>
    <g transform="translate(696, 14)">
      <rect width="140" height="48" rx="5" fill="#81d8d0" fill-opacity="0.04" stroke="#81d8d0" stroke-opacity="0.1" stroke-width="0.5"/>
      <circle cx="18" cy="16" r="4" fill="#81d8d0" opacity="0.3"/>
      <rect x="30" y="13" width="44" height="5" rx="2.5" fill="#81d8d0" opacity="0.22"/>
      <rect x="30" y="24" width="32" height="4" rx="2" fill="#81d8d0" opacity="0.12"/>
      <rect x="18" y="36" width="100" height="3" rx="1.5" fill="#81d8d0" opacity="0.06"/>
    </g>
    <g transform="translate(852, 14)">
      <rect width="140" height="48" rx="5" fill="#81d8d0" fill-opacity="0.025" stroke="#81d8d0" stroke-opacity="0.07" stroke-width="0.5"/>
      <circle cx="18" cy="16" r="4" fill="#81d8d0" opacity="0.18"/>
      <rect x="30" y="13" width="40" height="5" rx="2.5" fill="#81d8d0" opacity="0.15"/>
      <rect x="30" y="24" width="28" height="4" rx="2" fill="#81d8d0" opacity="0.08"/>
      <rect x="18" y="36" width="100" height="3" rx="1.5" fill="#81d8d0" opacity="0.04"/>
    </g>
  </g>

  <!-- ==================== LAYER 2: Alertas prioritários ==================== -->
  <g transform="translate(88, 170)">
    <rect width="1044" height="76" rx="8" fill="url(#topGrad)" stroke="#81d8d0" stroke-opacity="0.12" stroke-width="0.5"/>
    <rect x="0" y="0" width="5" height="76" rx="2.5" fill="#81d8d0" opacity="0.5"/>
    <text x="24" y="30" fill="#81d8d0" font-family="system-ui, sans-serif" font-size="13" font-weight="600" opacity="0.8">Alertas prioritários</text>
    <text x="24" y="50" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="11" opacity="0.5">Separação clara entre crítico, alerta e informação</text>
    <!-- Abstract: severity pills -->
    <g transform="translate(540, 14)">
      <rect width="92" height="20" rx="10" fill="#81d8d0" fill-opacity="0.1" stroke="#81d8d0" stroke-opacity="0.2" stroke-width="0.5"/>
      <rect x="14" y="8" width="32" height="4" rx="2" fill="#81d8d0" opacity="0.4"/>
      <rect x="108" y="0" width="92" height="20" rx="10" fill="#81d8d0" fill-opacity="0.06" stroke="#81d8d0" stroke-opacity="0.14" stroke-width="0.5"/>
      <rect x="122" y="8" width="32" height="4" rx="2" fill="#81d8d0" opacity="0.25"/>
      <rect x="216" y="0" width="92" height="20" rx="10" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.06" stroke-width="0.5"/>
      <rect x="230" y="8" width="32" height="4" rx="2" fill="#ffffff" opacity="0.12"/>
    </g>
    <!-- Progress bar below pills -->
    <rect x="540" y="46" width="452" height="3" rx="1.5" fill="#1a1a1a"/>
    <rect x="540" y="46" width="200" height="3" rx="1.5" fill="#81d8d0" opacity="0.15"/>
  </g>

  <!-- ==================== LAYER 3: Contexto complementar ==================== -->
  <g transform="translate(88, 256)">
    <rect width="1044" height="76" rx="8" fill="url(#cardGrad)" stroke="#1a1a1a" stroke-width="0.5"/>
    <rect x="0" y="0" width="5" height="76" rx="2.5" fill="#81d8d0" opacity="0.3"/>
    <text x="24" y="30" fill="#81d8d0" font-family="system-ui, sans-serif" font-size="13" font-weight="600" opacity="0.6">Contexto complementar</text>
    <text x="24" y="50" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="11" opacity="0.4">Detalhes acessados progressivamente, sem poluir a visão principal</text>
    <!-- Abstract: expandable panels -->
    <g transform="translate(540, 10)">
      <rect width="220" height="22" rx="4" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.05" stroke-width="0.5"/>
      <rect x="12" y="9" width="80" height="4" rx="2" fill="#ffffff" opacity="0.12"/>
      <path d="M200 8 L204 12 L208 8" stroke="#81d8d0" stroke-width="0.8" fill="none" opacity="0.2"/>
      <rect y="28" width="220" height="22" rx="4" fill="#81d8d0" fill-opacity="0.025" stroke="#81d8d0" stroke-opacity="0.06" stroke-width="0.5"/>
      <rect x="12" y="37" width="100" height="4" rx="2" fill="#81d8d0" opacity="0.1"/>
      <path d="M200 36 L204 40 L208 36" stroke="#81d8d0" stroke-width="0.8" fill="none" opacity="0.15"/>
    </g>
    <g transform="translate(780, 10)">
      <rect width="200" height="22" rx="4" fill="#ffffff" fill-opacity="0.015" stroke="#ffffff" stroke-opacity="0.04" stroke-width="0.5"/>
      <rect x="12" y="9" width="70" height="4" rx="2" fill="#ffffff" opacity="0.08"/>
      <rect y="28" width="200" height="22" rx="4" fill="#ffffff" fill-opacity="0.01" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5"/>
      <rect x="12" y="37" width="90" height="4" rx="2" fill="#ffffff" opacity="0.06"/>
    </g>
  </g>

  <!-- ==================== LAYER 4: Filtros e navegação ==================== -->
  <g transform="translate(88, 342)">
    <rect width="1044" height="76" rx="8" fill="url(#cardGrad)" stroke="#1a1a1a" stroke-width="0.5"/>
    <rect x="0" y="0" width="5" height="76" rx="2.5" fill="#81d8d0" opacity="0.2"/>
    <text x="24" y="30" fill="#81d8d0" font-family="system-ui, sans-serif" font-size="13" font-weight="600" opacity="0.5">Filtros e navegação</text>
    <text x="24" y="50" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="11" opacity="0.35">Navegação orientada por tarefa com filtros que reduzem ruído</text>
    <!-- Abstract: filter chips -->
    <g transform="translate(540, 22)">
      <rect width="72" height="28" rx="14" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.05" stroke-width="0.5"/>
      <rect x="14" y="12" width="28" height="4" rx="2" fill="#ffffff" opacity="0.08"/>
      <rect x="84" y="0" width="72" height="28" rx="14" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.05" stroke-width="0.5"/>
      <rect x="98" y="12" width="28" height="4" rx="2" fill="#ffffff" opacity="0.08"/>
      <rect x="168" y="0" width="72" height="28" rx="14" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.05" stroke-width="0.5"/>
      <rect x="182" y="12" width="28" height="4" rx="2" fill="#ffffff" opacity="0.08"/>
      <rect x="252" y="0" width="72" height="28" rx="14" fill="#81d8d0" fill-opacity="0.05" stroke="#81d8d0" stroke-opacity="0.12" stroke-width="0.5"/>
      <rect x="266" y="12" width="28" height="4" rx="2" fill="#81d8d0" opacity="0.2"/>
    </g>
  </g>

  <!-- ==================== LAYER 5: Histórico ==================== -->
  <g transform="translate(88, 428)">
    <rect width="1044" height="76" rx="8" fill="url(#cardGrad)" stroke="#1a1a1a" stroke-width="0.5"/>
    <rect x="0" y="0" width="5" height="76" rx="2.5" fill="#81d8d0" opacity="0.12"/>
    <text x="24" y="30" fill="#81d8d0" font-family="system-ui, sans-serif" font-size="13" font-weight="600" opacity="0.42">Histórico e acompanhamento</text>
    <text x="24" y="50" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="11" opacity="0.3">Rastreabilidade segmentada por categoria e linha temporal</text>
    <!-- Abstract: timeline -->
    <g transform="translate(540, 38)">
      <line x1="0" y1="0" x2="452" y2="0" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
      <circle cx="40" r="4" fill="#81d8d0" opacity="0.15"/>
      <circle cx="130" r="4" fill="#81d8d0" opacity="0.12"/>
      <circle cx="220" r="5" fill="#81d8d0" opacity="0.2"/>
      <circle cx="310" r="4" fill="#81d8d0" opacity="0.1"/>
      <circle cx="400" r="4" fill="#81d8d0" opacity="0.14"/>
      <!-- Small labels under dots -->
      <rect x="28" y="10" width="24" height="3" rx="1.5" fill="#ffffff" opacity="0.04"/>
      <rect x="118" y="10" width="24" height="3" rx="1.5" fill="#ffffff" opacity="0.04"/>
      <rect x="208" y="10" width="24" height="3" rx="1.5" fill="#ffffff" opacity="0.04"/>
      <rect x="298" y="10" width="24" height="3" rx="1.5" fill="#ffffff" opacity="0.04"/>
      <rect x="388" y="10" width="24" height="3" rx="1.5" fill="#ffffff" opacity="0.04"/>
    </g>
  </g>

  <!-- ==================== LAYER 6: Visão consolidada ==================== -->
  <g transform="translate(88, 514)">
    <rect width="1044" height="76" rx="8" fill="url(#cardGrad)" stroke="#1a1a1a" stroke-width="0.5"/>
    <rect x="0" y="0" width="5" height="76" rx="2.5" fill="#81d8d0" opacity="0.08"/>
    <text x="24" y="30" fill="#81d8d0" font-family="system-ui, sans-serif" font-size="13" font-weight="600" opacity="0.35">Visão consolidada para gestão</text>
    <text x="24" y="50" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="11" opacity="0.28">Panorama macro com indicadores agregados para decisão estratégica</text>
    <!-- Abstract: mini bar charts -->
    <g transform="translate(540, 14)">
      <rect width="110" height="48" rx="5" fill="#ffffff" fill-opacity="0.01" stroke="#ffffff" stroke-opacity="0.035" stroke-width="0.5"/>
      <rect x="14" y="30" width="14" height="12" rx="2" fill="#81d8d0" opacity="0.08"/>
      <rect x="34" y="22" width="14" height="20" rx="2" fill="#81d8d0" opacity="0.06"/>
      <rect x="54" y="14" width="14" height="28" rx="2" fill="#81d8d0" opacity="0.1"/>
      <rect x="74" y="26" width="14" height="16" rx="2" fill="#81d8d0" opacity="0.05"/>
      <rect x="126" y="0" width="110" height="48" rx="5" fill="#ffffff" fill-opacity="0.01" stroke="#ffffff" stroke-opacity="0.035" stroke-width="0.5"/>
      <rect x="140" y="24" width="14" height="18" rx="2" fill="#81d8d0" opacity="0.06"/>
      <rect x="160" y="30" width="14" height="12" rx="2" fill="#81d8d0" opacity="0.04"/>
      <rect x="180" y="18" width="14" height="24" rx="2" fill="#81d8d0" opacity="0.08"/>
      <rect x="200" y="28" width="14" height="14" rx="2" fill="#81d8d0" opacity="0.05"/>
    </g>
  </g>


  <!-- Footer -->
  <text x="600" y="616" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle" opacity="0.3" font-style="italic">Arquitetura conceitual — representação abstrata, sem dados reais do produto</text>
</svg>