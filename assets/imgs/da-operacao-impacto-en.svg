<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 368" fill="none">
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#090909"/>
    </linearGradient>
    <linearGradient id="lastCardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#121715"/>
      <stop offset="100%" stop-color="#0a0c0b"/>
    </linearGradient>
    <linearGradient id="progressLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#81d8d0" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#81d8d0" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.025"/></feComponentTransfer>
      <feBlend mode="overlay" in="SourceGraphic"/>
    </filter>
  </defs>

  <rect width="1200" height="368" fill="#050505" rx="12"/>
  <rect width="1200" height="368" fill="url(#noise)" rx="12" opacity="0.4"/>

  <!-- Title -->
  <text x="600" y="40" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" text-anchor="middle" opacity="0.9">What changed from this reorganization</text>
  <line x1="430" y1="54" x2="770" y2="54" stroke="#81d8d0" stroke-width="0.5" opacity="0.15"/>


  <!-- ==================== PROGRESS LINE at y=170 ==================== -->
  <line x1="120" y1="170" x2="1080" y2="170" stroke="url(#progressLine)" stroke-width="1"/>

  <!-- Chevrons -->
  <g fill="none" stroke-width="0.6" stroke-linecap="round">
    <path d="M236 165 L244 170 L236 175" stroke="#81d8d0" opacity="0.15"/>
    <path d="M476 165 L484 170 L476 175" stroke="#81d8d0" opacity="0.22"/>
    <path d="M716 165 L724 170 L716 175" stroke="#81d8d0" opacity="0.32"/>
    <path d="M956 165 L964 170 L956 175" stroke="#81d8d0" opacity="0.45"/>
  </g>


  <!-- ==================== STEP 1 ==================== -->
  <g>
    <text x="120" y="106" fill="#81d8d0" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="2" opacity="0.3">01</text>
    <text x="120" y="132" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle" opacity="0.65">Better organization</text>
    <text x="120" y="148" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle" opacity="0.65">of information</text>
    <circle cx="120" cy="170" r="5" fill="#050505" stroke="#81d8d0" stroke-width="1" stroke-opacity="0.2"/>
    <circle cx="120" cy="170" r="2" fill="#81d8d0" opacity="0.15"/>
    <g transform="translate(20, 190)">
      <rect width="200" height="84" rx="8" fill="url(#cardGrad)" stroke="#81d8d0" stroke-opacity="0.04" stroke-width="0.5"/>
      <text x="20" y="30" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="11" opacity="0.45">Data hierarchized</text>
      <text x="20" y="46" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="11" opacity="0.45">by relevance, not</text>
      <text x="20" y="62" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="11" opacity="0.45">by arrival order</text>
    </g>
  </g>

  <!-- ==================== STEP 2 ==================== -->
  <g>
    <text x="360" y="106" fill="#81d8d0" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="2" opacity="0.38">02</text>
    <text x="360" y="132" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle" opacity="0.72">Less effort</text>
    <text x="360" y="148" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle" opacity="0.72">for interpretation</text>
    <circle cx="360" cy="170" r="5" fill="#050505" stroke="#81d8d0" stroke-width="1" stroke-opacity="0.3"/>
    <circle cx="360" cy="170" r="2" fill="#81d8d0" opacity="0.25"/>
    <g transform="translate(260, 190)">
      <rect width="200" height="84" rx="8" fill="url(#cardGrad)" stroke="#81d8d0" stroke-opacity="0.06" stroke-width="0.5"/>
      <text x="20" y="30" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="11" opacity="0.48">Reduction of cognitive</text>
      <text x="20" y="46" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="11" opacity="0.48">load with less</text>
      <text x="20" y="62" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="11" opacity="0.48">simultaneous visual noise</text>
    </g>
  </g>

  <!-- ==================== STEP 3 ==================== -->
  <g>
    <text x="600" y="106" fill="#81d8d0" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="2" opacity="0.45">03</text>
    <text x="600" y="132" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle" opacity="0.8">More confidence</text>
    <text x="600" y="148" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle" opacity="0.8">in reading</text>
    <circle cx="600" cy="170" r="5" fill="#050505" stroke="#81d8d0" stroke-width="1" stroke-opacity="0.4"/>
    <circle cx="600" cy="170" r="2" fill="#81d8d0" opacity="0.35"/>
    <g transform="translate(500, 190)">
      <rect width="200" height="84" rx="8" fill="url(#cardGrad)" stroke="#81d8d0" stroke-opacity="0.08" stroke-width="0.5"/>
      <text x="20" y="30" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="11" opacity="0.52">Clear hierarchy generates</text>
      <text x="20" y="46" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="11" opacity="0.52">predictability and</text>
      <text x="20" y="62" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="11" opacity="0.52">safety to act</text>
    </g>
  </g>

  <!-- ==================== STEP 4 ==================== -->
  <g>
    <text x="840" y="106" fill="#81d8d0" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="2" opacity="0.55">04</text>
    <text x="840" y="132" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle" opacity="0.88">More consistent</text>
    <text x="840" y="148" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle" opacity="0.88">decisions</text>
    <circle cx="840" cy="170" r="5" fill="#050505" stroke="#81d8d0" stroke-width="1" stroke-opacity="0.5"/>
    <circle cx="840" cy="170" r="2" fill="#81d8d0" opacity="0.45"/>
    <g transform="translate(740, 190)">
      <rect width="200" height="84" rx="8" fill="url(#cardGrad)" stroke="#81d8d0" stroke-opacity="0.1" stroke-width="0.5"/>
      <text x="20" y="30" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="11" opacity="0.55">Objective criteria</text>
      <text x="20" y="46" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="11" opacity="0.55">replace intuition</text>
      <text x="20" y="62" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="11" opacity="0.55">and personal taste</text>
    </g>
  </g>

  <!-- ==================== STEP 5 ==================== -->
  <g>
    <text x="1080" y="106" fill="#81d8d0" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="2" opacity="0.65">05</text>
    <text x="1080" y="132" fill="#81d8d0" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle" opacity="0.8">Experience aligned</text>
    <text x="1080" y="148" fill="#81d8d0" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle" opacity="0.8">with real profiles</text>
    <circle cx="1080" cy="170" r="6" fill="#050505" stroke="#81d8d0" stroke-width="1" stroke-opacity="0.6"/>
    <circle cx="1080" cy="170" r="2.5" fill="#81d8d0" opacity="0.5"/>
    <g transform="translate(980, 190)">
      <rect width="200" height="84" rx="8" fill="url(#lastCardGrad)" stroke="#81d8d0" stroke-opacity="0.12" stroke-width="0.5"/>
      <text x="20" y="30" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="11" opacity="0.6">Operators and managers</text>
      <text x="20" y="46" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="11" opacity="0.6">with readings adapted</text>
      <text x="20" y="62" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="11" opacity="0.6">to their context</text>
    </g>
  </g>


  <!-- ==================== PROGRESS TRACK at y=294 ==================== -->
  <rect x="120" y="294" width="960" height="1.5" rx="0.75" fill="#1a1a1a"/>
  <rect x="120" y="294" width="960" height="1.5" rx="0.75" fill="url(#progressLine)"/>


  <!-- Footer -->
  <text x="600" y="348" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle" opacity="0.3" font-style="italic">Evolution perceived even before the full launch</text>
</svg>