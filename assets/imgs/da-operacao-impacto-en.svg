<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" fill="none">
  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#81d8d0" stop-opacity="0.06"/>
      <stop offset="40%" stop-color="#81d8d0" stop-opacity="0.18"/>
      <stop offset="70%" stop-color="#81d8d0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#81d8d0" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="#060606" rx="14"/>


  <!-- ==================== HEADER ==================== -->
  <text x="600" y="48" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" text-anchor="middle" opacity="0.3" letter-spacing="4">IMPACT</text>
  <text x="600" y="80" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" text-anchor="middle" opacity="0.85" letter-spacing="0.3">What changed from this reorganization</text>


  <!-- ==================== FLOW LINE at y=200 ==================== -->
  <line x1="100" y1="200" x2="1100" y2="200" stroke="url(#lineGrad)" stroke-width="1.5"/>


  <!-- ==================== STEP 01 ==================== -->
  <g>
    <text x="140" y="148" fill="#81d8d0" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" text-anchor="middle" letter-spacing="2" opacity="0.25">01</text>
    <text x="140" y="174" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" text-anchor="middle" opacity="0.6">Organization</text>
    <circle cx="140" cy="200" r="5" fill="#060606" stroke="#81d8d0" stroke-width="1" stroke-opacity="0.2"/>
    <circle cx="140" cy="200" r="2" fill="#81d8d0" opacity="0.15"/>
    <text x="140" y="240" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle" opacity="0.35">Data hierarchized</text>
    <text x="140" y="256" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle" opacity="0.35">by relevance</text>
  </g>


  <!-- ==================== STEP 02 ==================== -->
  <g>
    <text x="380" y="148" fill="#81d8d0" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" text-anchor="middle" letter-spacing="2" opacity="0.3">02</text>
    <text x="380" y="174" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" text-anchor="middle" opacity="0.7">Less effort</text>
    <circle cx="380" cy="200" r="5" fill="#060606" stroke="#81d8d0" stroke-width="1" stroke-opacity="0.3"/>
    <circle cx="380" cy="200" r="2" fill="#81d8d0" opacity="0.25"/>
    <text x="380" y="240" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle" opacity="0.38">Reduction of</text>
    <text x="380" y="256" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle" opacity="0.38">cognitive load</text>
  </g>


  <!-- ==================== STEP 03 ==================== -->
  <g>
    <text x="600" y="148" fill="#81d8d0" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" text-anchor="middle" letter-spacing="2" opacity="0.38">03</text>
    <text x="600" y="174" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" text-anchor="middle" opacity="0.78">More confidence</text>
    <circle cx="600" cy="200" r="5.5" fill="#060606" stroke="#81d8d0" stroke-width="1" stroke-opacity="0.38"/>
    <circle cx="600" cy="200" r="2" fill="#81d8d0" opacity="0.32"/>
    <text x="600" y="240" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle" opacity="0.42">Clear hierarchy creates</text>
    <text x="600" y="256" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle" opacity="0.42">safety to act</text>
  </g>


  <!-- ==================== STEP 04 ==================== -->
  <g>
    <text x="820" y="148" fill="#81d8d0" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" text-anchor="middle" letter-spacing="2" opacity="0.45">04</text>
    <text x="820" y="174" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" text-anchor="middle" opacity="0.85">Consistent decisions</text>
    <circle cx="820" cy="200" r="6" fill="#060606" stroke="#81d8d0" stroke-width="1" stroke-opacity="0.45"/>
    <circle cx="820" cy="200" r="2.5" fill="#81d8d0" opacity="0.4"/>
    <text x="820" y="240" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle" opacity="0.48">Objective criteria</text>
    <text x="820" y="256" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle" opacity="0.48">replace intuition</text>
  </g>


  <!-- ==================== STEP 05 — CONCLUSION ==================== -->
  <g>
    <text x="1060" y="148" fill="#81d8d0" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" text-anchor="middle" letter-spacing="2" opacity="0.55">05</text>
    <text x="1060" y="174" fill="#81d8d0" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" text-anchor="middle" opacity="0.75">Aligned experience</text>
    <circle cx="1060" cy="200" r="7" fill="#060606" stroke="#81d8d0" stroke-width="1" stroke-opacity="0.55"/>
    <circle cx="1060" cy="200" r="2.5" fill="#81d8d0" opacity="0.5"/>
    <text x="1060" y="240" fill="#81d8d0" font-family="system-ui, sans-serif" font-size="11" font-weight="500" text-anchor="middle" opacity="0.4">Operators and managers</text>
    <text x="1060" y="256" fill="#81d8d0" font-family="system-ui, sans-serif" font-size="11" font-weight="500" text-anchor="middle" opacity="0.4">with adapted readings</text>
  </g>


</svg>