<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" fill="none">
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#090909"/>
    </linearGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.025"/></feComponentTransfer>
      <feBlend mode="overlay" in="SourceGraphic"/>
    </filter>
  </defs>

  <rect width="1200" height="520" fill="#050505" rx="12"/>
  <rect width="1200" height="520" fill="url(#noise)" rx="12" opacity="0.4"/>

  <!-- Title -->
  <text x="600" y="40" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" text-anchor="middle" opacity="0.9">Cindy — the foundation that ensures consistency</text>
  <line x1="420" y1="54" x2="780" y2="54" stroke="#81d8d0" stroke-width="0.5" opacity="0.15"/>


  <!-- ==================== PILLAR 1: TOKENS ==================== -->
  <g transform="translate(60, 100)">
    <rect width="252" height="340" rx="8" fill="url(#cardGrad)" stroke="#1a1a1a" stroke-width="0.5"/>

    <text x="20" y="28" fill="#81d8d0" font-family="system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="2" opacity="0.7">TOKENS</text>
    <line x1="20" y1="38" x2="80" y2="38" stroke="#81d8d0" stroke-width="0.5" opacity="0.15"/>

    <!-- Color tokens -->
    <text x="20" y="64" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="10" opacity="0.45">Colors</text>
    <g transform="translate(20, 74)">
      <rect width="24" height="24" rx="4" fill="#81d8d0" opacity="0.6"/>
      <rect x="30" y="0" width="24" height="24" rx="4" fill="#81d8d0" opacity="0.35"/>
      <rect x="60" y="0" width="24" height="24" rx="4" fill="#81d8d0" opacity="0.15"/>
      <rect x="90" y="0" width="24" height="24" rx="4" fill="#ffffff" opacity="0.08"/>
      <rect x="120" y="0" width="24" height="24" rx="4" fill="#ffffff" opacity="0.04"/>
      <rect x="150" y="0" width="24" height="24" rx="4" fill="#1a1a1a" stroke="#333333" stroke-width="0.5"/>
    </g>

    <!-- Spacing tokens -->
    <text x="20" y="126" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="10" opacity="0.45">Spacing</text>
    <g transform="translate(20, 136)">
      <rect width="16" height="8" rx="2" fill="#81d8d0" opacity="0.12"/>
      <text x="22" y="7" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="8" opacity="0.3">4</text>
      <rect y="14" width="32" height="8" rx="2" fill="#81d8d0" opacity="0.15"/>
      <text x="38" y="21" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="8" opacity="0.3">8</text>
      <rect y="28" width="64" height="8" rx="2" fill="#81d8d0" opacity="0.18"/>
      <text x="70" y="35" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="8" opacity="0.3">16</text>
      <rect y="42" width="96" height="8" rx="2" fill="#81d8d0" opacity="0.22"/>
      <text x="102" y="49" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="8" opacity="0.3">24</text>
      <rect y="56" width="144" height="8" rx="2" fill="#81d8d0" opacity="0.25"/>
      <text x="150" y="63" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="8" opacity="0.3">32</text>
    </g>

    <!-- Typography tokens -->
    <text x="20" y="224" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="10" opacity="0.45">Typography</text>
    <text x="20" y="246" fill="#ffffff" font-family="system-ui, sans-serif" font-size="16" font-weight="600" opacity="0.5">Heading L</text>
    <text x="20" y="266" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="600" opacity="0.4">Heading M</text>
    <text x="20" y="282" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="500" opacity="0.3">Body</text>
    <text x="20" y="296" fill="#ffffff" font-family="system-ui, sans-serif" font-size="9" opacity="0.25">Caption</text>

    <!-- Radius tokens -->
    <text x="20" y="320" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="10" opacity="0.45">Radius</text>
    <g transform="translate(80, 310)">
      <rect width="20" height="20" rx="2" fill="none" stroke="#81d8d0" stroke-width="0.5" opacity="0.2"/>
      <rect x="28" y="0" width="20" height="20" rx="6" fill="none" stroke="#81d8d0" stroke-width="0.5" opacity="0.25"/>
      <rect x="56" y="0" width="20" height="20" rx="10" fill="none" stroke="#81d8d0" stroke-width="0.5" opacity="0.3"/>
    </g>
  </g>


  <!-- ==================== PILLAR 2: COMPONENTS ==================== -->
  <g transform="translate(336, 100)">
    <rect width="252" height="340" rx="8" fill="url(#cardGrad)" stroke="#1a1a1a" stroke-width="0.5"/>

    <text x="20" y="28" fill="#81d8d0" font-family="system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="2" opacity="0.7">COMPONENTS</text>
    <line x1="20" y1="38" x2="108" y2="38" stroke="#81d8d0" stroke-width="0.5" opacity="0.15"/>

    <!-- Abstract button component -->
    <text x="20" y="64" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="10" opacity="0.45">Primary button</text>
    <rect x="20" y="74" width="120" height="32" rx="6" fill="#81d8d0" fill-opacity="0.12" stroke="#81d8d0" stroke-opacity="0.25" stroke-width="0.5"/>
    <rect x="44" y="86" width="72" height="5" rx="2.5" fill="#81d8d0" opacity="0.4"/>

    <!-- Abstract card component -->
    <text x="20" y="130" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="10" opacity="0.45">Standard card</text>
    <rect x="20" y="140" width="212" height="80" rx="6" fill="#0a0a0a" stroke="#1a1a1a" stroke-width="0.5"/>
    <rect x="32" y="152" width="80" height="5" rx="2.5" fill="#ffffff" opacity="0.15"/>
    <rect x="32" y="164" width="140" height="4" rx="2" fill="#ffffff" opacity="0.06"/>
    <rect x="32" y="174" width="120" height="4" rx="2" fill="#ffffff" opacity="0.06"/>
    <rect x="32" y="196" width="60" height="16" rx="4" fill="#81d8d0" fill-opacity="0.08" stroke="#81d8d0" stroke-opacity="0.15" stroke-width="0.5"/>
    <rect x="44" y="202" width="36" height="4" rx="2" fill="#81d8d0" opacity="0.25"/>

    <!-- Abstract alert component -->
    <text x="20" y="244" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="10" opacity="0.45">Alert</text>
    <rect x="20" y="254" width="212" height="28" rx="6" fill="#81d8d0" fill-opacity="0.04" stroke="#81d8d0" stroke-opacity="0.1" stroke-width="0.5"/>
    <circle cx="36" cy="268" r="4" fill="#81d8d0" opacity="0.3"/>
    <rect x="48" y="265" width="100" height="5" rx="2.5" fill="#81d8d0" opacity="0.15"/>

    <!-- Abstract input component -->
    <text x="20" y="306" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="10" opacity="0.45">Input</text>
    <rect x="20" y="312" width="160" height="20" rx="4" fill="#0a0a0a" stroke="#333333" stroke-width="0.5"/>
    <rect x="28" y="320" width="60" height="4" rx="2" fill="#ffffff" opacity="0.06"/>
  </g>


  <!-- ==================== PILLAR 3: STATES ==================== -->
  <g transform="translate(612, 100)">
    <rect width="252" height="340" rx="8" fill="url(#cardGrad)" stroke="#1a1a1a" stroke-width="0.5"/>

    <text x="20" y="28" fill="#81d8d0" font-family="system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="2" opacity="0.7">STATES</text>
    <line x1="20" y1="38" x2="80" y2="38" stroke="#81d8d0" stroke-width="0.5" opacity="0.15"/>

    <!-- Default state -->
    <text x="20" y="64" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="10" opacity="0.45">Default</text>
    <rect x="20" y="74" width="212" height="32" rx="6" fill="#81d8d0" fill-opacity="0.08" stroke="#81d8d0" stroke-opacity="0.2" stroke-width="0.5"/>
    <rect x="76" y="86" width="80" height="5" rx="2.5" fill="#81d8d0" opacity="0.35"/>

    <!-- Hover state -->
    <text x="20" y="126" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="10" opacity="0.45">Hover</text>
    <rect x="20" y="136" width="212" height="32" rx="6" fill="#81d8d0" fill-opacity="0.14" stroke="#81d8d0" stroke-opacity="0.3" stroke-width="0.5"/>
    <rect x="76" y="148" width="80" height="5" rx="2.5" fill="#81d8d0" opacity="0.5"/>

    <!-- Active state -->
    <text x="20" y="188" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="10" opacity="0.45">Active</text>
    <rect x="20" y="198" width="212" height="32" rx="6" fill="#81d8d0" fill-opacity="0.2" stroke="#81d8d0" stroke-opacity="0.4" stroke-width="0.5"/>
    <rect x="76" y="210" width="80" height="5" rx="2.5" fill="#81d8d0" opacity="0.6"/>

    <!-- Disabled state -->
    <text x="20" y="250" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="10" opacity="0.45">Disabled</text>
    <rect x="20" y="260" width="212" height="32" rx="6" fill="#ffffff" fill-opacity="0.015" stroke="#ffffff" stroke-opacity="0.04" stroke-width="0.5"/>
    <rect x="76" y="272" width="80" height="5" rx="2.5" fill="#ffffff" opacity="0.06"/>

    <!-- Severity indicators -->
    <text x="20" y="316" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="10" opacity="0.45">Severity</text>
    <g transform="translate(20, 324)">
      <circle cx="6" cy="0" r="5" fill="#81d8d0" opacity="0.5"/>
      <text x="18" y="3" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="9" opacity="0.35">Critical</text>
      <circle cx="76" cy="0" r="5" fill="#81d8d0" opacity="0.3"/>
      <text x="88" y="3" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="9" opacity="0.35">Warning</text>
      <circle cx="148" cy="0" r="5" fill="#81d8d0" opacity="0.12"/>
      <text x="160" y="3" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="9" opacity="0.35">Info</text>
    </g>
  </g>


  <!-- ==================== PILLAR 4: RULES ==================== -->
  <g transform="translate(888, 100)">
    <rect width="252" height="340" rx="8" fill="url(#cardGrad)" stroke="#1a1a1a" stroke-width="0.5"/>

    <text x="20" y="28" fill="#81d8d0" font-family="system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="2" opacity="0.7">RULES</text>
    <line x1="20" y1="38" x2="72" y2="38" stroke="#81d8d0" stroke-width="0.5" opacity="0.15"/>

    <!-- Hierarchy rule -->
    <text x="20" y="64" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="10" opacity="0.45">Visual hierarchy</text>
    <g transform="translate(20, 74)">
      <rect width="212" height="14" rx="3" fill="#81d8d0" fill-opacity="0.06" stroke="#81d8d0" stroke-opacity="0.12" stroke-width="0.5"/>
      <rect x="8" y="4" width="80" height="5" rx="2.5" fill="#81d8d0" opacity="0.3"/>
      <rect y="22" width="212" height="12" rx="3" fill="#81d8d0" fill-opacity="0.035" stroke="#81d8d0" stroke-opacity="0.08" stroke-width="0.5"/>
      <rect x="8" y="25.5" width="60" height="4" rx="2" fill="#81d8d0" opacity="0.18"/>
      <rect y="42" width="212" height="10" rx="3" fill="#ffffff" fill-opacity="0.015" stroke="#ffffff" stroke-opacity="0.04" stroke-width="0.5"/>
      <rect x="8" y="45" width="48" height="3" rx="1.5" fill="#ffffff" opacity="0.08"/>
    </g>

    <!-- Spacing rules -->
    <text x="20" y="148" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="10" opacity="0.45">Spatial consistency</text>
    <g transform="translate(20, 158)">
      <rect width="92" height="28" rx="4" fill="#0a0a0a" stroke="#1a1a1a" stroke-width="0.5"/>
      <rect x="120" y="0" width="92" height="28" rx="4" fill="#0a0a0a" stroke="#1a1a1a" stroke-width="0.5"/>
      <line x1="96" y1="14" x2="116" y2="14" stroke="#81d8d0" stroke-width="0.5" opacity="0.25" stroke-dasharray="2 2"/>
      <text x="106" y="10" fill="#81d8d0" font-family="system-ui, sans-serif" font-size="7" text-anchor="middle" opacity="0.3">24</text>
    </g>

    <!-- Behavior rules -->
    <text x="20" y="218" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="10" opacity="0.45">Behavior patterns</text>
    <g transform="translate(20, 228)">
      <rect width="212" height="20" rx="4" fill="#0a0a0a" stroke="#1a1a1a" stroke-width="0.5"/>
      <rect x="8" y="7" width="40" height="5" rx="2.5" fill="#ffffff" opacity="0.08"/>
      <text x="200" y="14" fill="#81d8d0" font-family="system-ui, sans-serif" font-size="8" text-anchor="end" opacity="0.25">→ expand</text>
      <rect y="26" width="212" height="40" rx="4" fill="#81d8d0" fill-opacity="0.02" stroke="#81d8d0" stroke-opacity="0.06" stroke-width="0.5" stroke-dasharray="3 3"/>
      <rect x="8" y="34" width="120" height="4" rx="2" fill="#81d8d0" opacity="0.08"/>
      <rect x="8" y="44" width="100" height="4" rx="2" fill="#81d8d0" opacity="0.06"/>
      <rect x="8" y="54" width="80" height="4" rx="2" fill="#81d8d0" opacity="0.04"/>
    </g>

    <!-- Documentation -->
    <text x="20" y="310" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="10" opacity="0.45">Documentation</text>
    <g transform="translate(20, 318)">
      <rect width="56" height="14" rx="7" fill="#81d8d0" fill-opacity="0.06" stroke="#81d8d0" stroke-opacity="0.12" stroke-width="0.5"/>
      <text x="28" y="10" fill="#81d8d0" font-family="system-ui, sans-serif" font-size="8" text-anchor="middle" opacity="0.35">Props</text>
      <rect x="64" y="0" width="72" height="14" rx="7" fill="#81d8d0" fill-opacity="0.04" stroke="#81d8d0" stroke-opacity="0.1" stroke-width="0.5"/>
      <text x="100" y="10" fill="#81d8d0" font-family="system-ui, sans-serif" font-size="8" text-anchor="middle" opacity="0.3">Variants</text>
      <rect x="144" y="0" width="60" height="14" rx="7" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.05" stroke-width="0.5"/>
      <text x="174" y="10" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="8" text-anchor="middle" opacity="0.25">Usage</text>
    </g>
  </g>


  <!-- Footer -->
  <text x="600" y="494" fill="#a6a6a6" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle" opacity="0.3" font-style="italic">Design System integrated with Storybook with continuous review to maintain consistency</text>
</svg>